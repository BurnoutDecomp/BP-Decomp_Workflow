name: Sync work server

on:
  push:
    branches:
      - main
    paths:
      - "progress/**"
      - ".github/workflows/sync-work-server.yml"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger server import
        env:
          BP_WORK_SERVER_SYNC_URL: ${{ secrets.BP_WORK_SERVER_SYNC_URL }}
          BP_WORK_SERVER_SYNC_TOKEN: ${{ secrets.BP_WORK_SERVER_SYNC_TOKEN }}
          BP_WORK_SERVER_SYNC_HOST: ${{ secrets.BP_WORK_SERVER_SYNC_HOST }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          test -n "$BP_WORK_SERVER_SYNC_URL"
          test -n "$BP_WORK_SERVER_SYNC_TOKEN"

          args=(
            --fail
            --show-error
            --silent
            --request POST
            --header "X-BP-Admin-Token: ${BP_WORK_SERVER_SYNC_TOKEN}"
            --header "Content-Type: application/json"
          )
          if [ -n "${BP_WORK_SERVER_SYNC_HOST:-}" ]; then
            args+=(--header "Host: ${BP_WORK_SERVER_SYNC_HOST}")
          fi

          curl "${args[@]}" \
            --data "{\"branch\":\"${BRANCH}\",\"commit\":\"${COMMIT}\",\"reset\":false}" \
            "$BP_WORK_SERVER_SYNC_URL"
